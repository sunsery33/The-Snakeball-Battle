<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>球蛇大作战 | The SnakeBall Battle</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="gameCanvas" aria-label="The SnakeBall Battle game canvas"></canvas>

    <header class="hud">
      <div class="brand">
        <span class="brand-mark"></span>
        <div>
          <strong>球蛇大作战</strong>
          <small>The SnakeBall Battle</small>
        </div>
      </div>

      <div class="stats" aria-live="polite">
        <div>
          <span>质量</span>
          <strong id="massValue">0</strong>
        </div>
        <div>
          <span>长度</span>
          <strong id="lengthValue">0</strong>
        </div>
        <div>
          <span>排行</span>
          <strong id="rankValue">1/1</strong>
        </div>
      </div>

      <div class="merge-meter" title="Space merge energy">
        <span id="mergeFill"></span>
      </div>

      <div class="length-meters">
        <div class="charge-meter lengthen-meter" title="Q lengthen">
          <b>Q</b>
          <span id="lengthenFill"></span>
        </div>
        <div class="charge-meter shorten-meter" title="E shorten">
          <b>E</b>
          <span id="shortenFill"></span>
        </div>
      </div>

      <div class="hud-actions">
        <button id="pauseButton" type="button" title="Pause">II</button>
        <button id="restartButton" type="button" title="Restart">&#8635;</button>
      </div>
    </header>

    <section id="startScreen" class="start-screen">
      <button id="tutorialOpenButton" class="tutorial-open-button" type="button">新手教程</button>

      <div class="start-shell">
        <aside class="start-card skin-card">
          <div class="card-title">
            <span>皮肤</span>
            <strong>选择你的球蛇外观</strong>
          </div>
          <div id="skinPreview" class="skin-preview">
            <div class="preview-chain">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
          <div id="skinGrid" class="skin-grid" aria-label="Skin selection"></div>
        </aside>

        <main class="start-card play-card">
          <div class="hero-lockup">
            <span class="brand-mark"></span>
            <div>
              <strong>球蛇大作战</strong>
              <small>The SnakeBall Battle</small>
            </div>
          </div>

          <label class="name-field">
            <span>名字</span>
            <input id="playerNameInput" type="text" maxlength="16" placeholder="Guest" autocomplete="off" />
          </label>

          <button id="startPlayButton" class="play-button" type="button">Play</button>

          <div class="online-panel" aria-label="Online multiplayer">
            <div class="online-actions">
              <button id="createRoomButton" type="button">创建房间</button>
              <button id="quickMatchButton" type="button">快速匹配</button>
            </div>
            <label class="room-field">
              <span>房间码</span>
              <div>
                <input id="roomCodeInput" type="text" maxlength="4" placeholder="ABCD" autocomplete="off" />
                <button id="joinRoomButton" type="button">加入</button>
              </div>
            </label>
            <p id="onlineStatus" class="online-status">联机服务需要通过服务器地址打开。</p>
          </div>
        </main>
      </div>

      <aside id="tutorialPanel" class="tutorial-panel" aria-label="新手教程" hidden>
        <div class="tutorial-dialog">
          <div class="tutorial-header">
            <strong>新手教程</strong>
            <button id="tutorialCloseButton" type="button" aria-label="关闭教程">x</button>
          </div>
          <img id="tutorialImage" class="tutorial-image" alt="新手教程图片" />
          <div class="tutorial-controls">
            <span id="tutorialPageValue">1/3</span>
            <button id="tutorialNextButton" type="button" aria-label="下一页">></button>
          </div>
        </div>
      </aside>
    </section>

    <div id="toast" class="toast" aria-live="polite"></div>

    <section id="gameOver" class="overlay" hidden>
      <div class="overlay-panel">
        <h1>球蛇被吃掉了</h1>
        <p id="finalScore">质量 0</p>
        <div class="overlay-actions">
          <button id="playAgainButton" class="primary-button" type="button">再来一局</button>
          <button id="gameOverLobbyButton" class="secondary-button" type="button">回到大厅</button>
        </div>
      </div>
    </section>

    <section id="exitPrompt" class="overlay" hidden>
      <div class="overlay-panel">
        <h1>回到大厅？</h1>
        <p>当前这一局会结束。</p>
        <div class="overlay-actions">
          <button id="stayInGameButton" class="secondary-button" type="button">继续游戏</button>
          <button id="confirmLobbyButton" class="primary-button danger-button" type="button">回到大厅</button>
        </div>
      </div>
    </section>

    <script src="./game.js"></script>
  </body>
</html>
